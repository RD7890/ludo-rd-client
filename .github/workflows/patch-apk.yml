name: Patch Ludo King APK (No-Root)

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Direct download URL of the original Ludo King APK'
        required: true
        type: string

permissions:
  contents: write

jobs:
  patch:
    name: Patch APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Grab the pre-built .so from latest hook release — no NDK needed
      - name: Download pre-built hook .so
        run: |
          SO_URL=$(curl -s https://api.github.com/repos/RD7890/ludo-rd-client/releases \
            | python3 -c "
          import sys,json
          rels=json.load(sys.stdin)
          for r in rels:
            for a in r.get('assets',[]):
              if a['name'].endswith('.so') or 'hook' in r.get('tag_name','').lower():
                for a2 in r['assets']:
                  print(a2['browser_download_url']); break
                break
          " | head -1)
          # Fallback: get the .zip from hook release and extract .so
          HOOK_ZIP=$(curl -s https://api.github.com/repos/RD7890/ludo-rd-client/releases \
            | python3 -c "
          import sys,json
          rels=json.load(sys.stdin)
          for r in rels:
            if 'hook' in r.get('tag_name',''):
              for a in r['assets']:
                if a['name'].endswith('.zip'):
                  print(a['browser_download_url']); break
              break
          ")
          echo "Hook ZIP URL: $HOOK_ZIP"
          curl -sL "$HOOK_ZIP" -o hook_module.zip
          unzip -o hook_module.zip -d hook_module
          find hook_module -name "*.so" -exec cp {} scripts/ludordhook.so \;
          echo "Hook .so size: $(ls -lh scripts/ludordhook.so | awk '{print $5}')"

      # Download apktool jar (no apt needed)
      - name: Download apktool
        run: |
          curl -sL https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -o apktool.jar
          printf '#!/bin/bash\nexec java -jar "%s" "$@"\n' "$(pwd)/apktool.jar" | sudo tee /usr/local/bin/apktool > /dev/null
          sudo chmod +x /usr/local/bin/apktool
          apktool --version

      - name: Download Ludo King APK
        run: |
          echo "Downloading: ${{ github.event.inputs.apk_url }}"
          curl -L "${{ github.event.inputs.apk_url }}" -o original.apk --progress-bar
          echo "Size: $(ls -lh original.apk | awk '{print $5}')"

      - name: Decode APK
        run: |
          apktool decode original.apk -o decoded_apk -f
          ls decoded_apk/

      - name: Inject hook
        run: |
          python3 scripts/inject.py decoded_apk
          find decoded_apk/smali* -name "LudoRDLoader.smali" -exec echo "=== Loader smali ===" \; -exec cat {} \;
          ls -lh decoded_apk/lib/arm64-v8a/

      - name: Rebuild APK
        run: |
          apktool build decoded_apk -o patched_unsigned.apk
          ls -lh patched_unsigned.apk

      - name: Align + Sign APK
        run: |
          # zipalign is in Android SDK (pre-installed on runner)
          ZIPALIGN=$(find $ANDROID_HOME/build-tools -name "zipalign" | sort -V | tail -1)
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" -type f | sort -V | tail -1)
          echo "zipalign: $ZIPALIGN"
          echo "apksigner: $APKSIGNER"

          $ZIPALIGN -v 4 patched_unsigned.apk patched_aligned.apk

          mkdir -p signing
          keytool -genkeypair -alias ludord -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore signing/ludord.jks -storepass ludord123 -keypass ludord123 \
            -dname "CN=LudoRD, OU=Dev, O=RD, L=Unknown, S=Unknown, C=US" -noprompt

          $APKSIGNER sign \
            --ks signing/ludord.jks \
            --ks-pass pass:ludord123 \
            --key-pass pass:ludord123 \
            --out LudoKing-LudoRD-Patched.apk \
            patched_aligned.apk

          echo "Final APK: $(ls -lh LudoKing-LudoRD-Patched.apk | awk '{print $5}')"
          $APKSIGNER verify --verbose LudoKing-LudoRD-Patched.apk | head -3

      - name: Get version
        id: ver
        run: |
          VER=$(grep -oP 'versionName="\K[^"]+' decoded_apk/AndroidManifest.xml | head -1 || echo "10.4.0")
          echo "name=$VER" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: noroot-v${{ steps.ver.outputs.name }}-build.${{ github.run_number }}
          name: "No-Root Patched Ludo King v${{ steps.ver.outputs.name }}"
          body: |
            ## Ludo RD — No-Root Patched APK

            Baked-in dice hook. No root, no Magisk required.

            ### Install
            1. Uninstall original Ludo King
            2. Install this APK (tap "Install anyway" if Play Protect warns)
            3. Install Ludo RD Client APK
            4. Set dice → Launch

            Built from `${{ github.sha }}`
          draft: false
          prerelease: false
          files: LudoKing-LudoRD-Patched.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
